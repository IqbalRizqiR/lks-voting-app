name: LKS Production Pipeline

on:
  push:
    branches:
      - prod

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: lks-voting-image
  ECS_CLUSTER: lks-voting-cluster
  ECS_SERVICE_VOTE: lks-vote-service
  ECS_SERVICE_RESULT: lks-result-service
  ECS_SERVICE_WORKER: lks-worker-service

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push Images
        run: |
          docker build -t $ECR_REPOSITORY:vote-prod-latest ./vote
          docker tag $ECR_REPOSITORY:vote-prod-latest 340990990989.dkr.ecr.us-east-1.amazonaws.com/$ECR_REPOSITORY:vote-prod-latest
          docker push 340990990989.dkr.ecr.us-east-1.amazonaws.com/$ECR_REPOSITORY:vote-prod-latest

          docker build -t $ECR_REPOSITORY:result-prod-latest ./result
          docker tag $ECR_REPOSITORY:result-prod-latest 340990990989.dkr.ecr.us-east-1.amazonaws.com/$ECR_REPOSITORY:result-prod-latest
          docker push 340990990989.dkr.ecr.us-east-1.amazonaws.com/$ECR_REPOSITORY:result-prod-latest

          docker build -t $ECR_REPOSITORY:worker-prod-latest ./worker
          docker tag $ECR_REPOSITORY:worker-prod-latest 340990990989.dkr.ecr.us-east-1.amazonaws.com/$ECR_REPOSITORY:worker-prod-latest
          docker push 340990990989.dkr.ecr.us-east-1.amazonaws.com/$ECR_REPOSITORY:worker-prod-latest


  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy Vote Service
        run: |
          aws ecs update-service \
          --cluster lks-voting-cluster \
          --service lks-vote-service \
          --force-new-deployment

      - name: Deploy Result Service
        run: |
          aws ecs update-service \
          --cluster lks-voting-cluster \
          --service lks-result-service \
          --force-new-deployment

      - name: Deploy Worker Service
        run: |
          aws ecs update-service \
          --cluster lks-voting-cluster \
          --service lks-worker-service \
          --force-new-deployment

      - name: Send SNS Notification
        run: |
          aws sns publish \
          --topic-arn ${{ secrets.AWS_SNS_ARN }} \
          --subject "Hello from Jawa Timur!" \
          --message "New version The Voting App from Jawa Timur is Released !!"